name: YouTube 악플 봇

on:
  # ① 폰에서 수동 실행 (GitHub 앱 → Actions 탭에서 버튼 누르면 됨)
  workflow_dispatch:
    inputs:
      video_url:
        description: '특정 영상만 스캔 (URL 또는 ID, 비워두면 채널 전체)'
        required: false
        default: ''
      max_comments:
        description: '최대 스캔 댓글 수'
        required: false
        default: '40'

  # ② 자동 실행 (매일 오전 9시, 오후 3시, 오후 9시 KST)
  schedule:
    - cron: '0 0 * * *'   # KST 09:00
    - cron: '0 6 * * *'   # KST 15:00
    - cron: '0 12 * * *'  # KST 21:00

jobs:
  moderate:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: Google 인증 토큰 복원
        run: |
          echo '${{ secrets.GOOGLE_TOKEN_JSON }}' > token.json

      - name: 악플 봇 실행
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "${{ github.event.inputs.video_url }}" ]; then
            py_cmd="python modbot.py --max ${{ github.event.inputs.max_comments }} --video ${{ github.event.inputs.video_url }}"
          else
            py_cmd="python modbot.py --max ${{ github.event.inputs.max_comments || '40' }}"
          fi
          echo "실행: $py_cmd"
          $py_cmd

      - name: 결과 저장 (offender_data.json 업로드)
        uses: actions/upload-artifact@v4
        with:
          name: modbot-results-${{ github.run_number }}
          path: |
            offender_data.json
            modbot.log
          retention-days: 30
